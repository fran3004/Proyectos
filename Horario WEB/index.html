<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Mi horario UPC: consulta y arma tu horario universitario de forma rápida.">
<title>Mi horario UPC</title>
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon/favicon-64x64.png">
<link rel="apple-touch-icon" href="assets/favicon/apple-touch-icon.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1>Mi horario UPC</h1>
    <div class="sub" id="subTitle"></div>
  </div>
  <div class="header-actions">
    <div class="stats no-print" id="stats"></div>
    <div class="button-group">
      <button class="primary no-print" id="btnPlanner" title="Buscar horarios compatibles">Buscar</button>
      <button class="no-print danger-btn" id="btnClear" title="Quitar todas las materias">Limpiar</button>
      <button class="no-print" id="btnTheme" title="Cambiar modo de color">Tema</button>
      <button class="primary no-print" id="btnPrint" title="Imprimir o guardar como PDF">PDF</button>
    </div>
  </div>
</header>

<div class="print-header">
 <div class="title">Mi horario UPC</div>
 <div class="meta" id="printMeta"></div>
</div>

<div id="conflictBar"></div>

<main>
  <aside class="no-print">
    <div class="search-box">
      <input id="search" type="text" placeholder="Buscar materia o código..." autocomplete="off">
    </div>
    <div id="courseList"></div>
  </aside>

  <div id="calWrap">
    <div id="emptyMsg">
      Selecciona una materia en el panel de la izquierda y elige un grupo.<br>
      El horario se arma aquí automáticamente y te avisa si hay choques.
    </div>
    <div id="calendar" style="display:none"></div>
    <div id="courseLegend" class="course-legend no-print"></div>
  </div>
</main>

<script src="js/horarios.js"></script>
<script src="js/horarios_2.js"></script>
<script src="js/app.js"></script>
</body>
</html>
